<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>

    <!-- Eye outline gradient: bright cyan top → deeper teal base -->
    <linearGradient id="eyeStroke" x1="4" y1="18" x2="60" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#66EEFF"/>
      <stop offset="50%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0077AA"/>
    </linearGradient>

    <!-- Deep dark fill inside the eye -->
    <radialGradient id="eyeFill" cx="50%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#001E42" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#000A18" stop-opacity="0.99"/>
    </radialGradient>

    <!-- Gold radial for the pupil -->
    <radialGradient id="pupilGold" cx="36%" cy="32%" r="64%">
      <stop offset="0%"   stop-color="#FFFBD0"/>
      <stop offset="30%"  stop-color="#FFD700"/>
      <stop offset="72%"  stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#D05800"/>
    </radialGradient>

    <!-- Soft glow on nodes & outline -->
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Larger glow for pupil -->
    <filter id="pupilGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Outer eye glow -->
    <filter id="eyeOuterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip everything inside eye shape -->
    <clipPath id="eyeMask">
      <path d="M 4 32 C 16 16, 48 16, 60 32 C 48 48, 16 48, 4 32 Z"/>
    </clipPath>

  </defs>

  <!-- ── 1. Eye dark fill ── -->
  <path d="M 4 32 C 16 16, 48 16, 60 32 C 48 48, 16 48, 4 32 Z"
        fill="url(#eyeFill)"/>

  <!-- ── 2. Neural network (clipped inside eye) ── -->
  <g clip-path="url(#eyeMask)">

    <!-- Spokes: centre → iris ring -->
    <g stroke="#00D4FF" stroke-width="0.85" opacity="0.52">
      <line x1="32" y1="32" x2="39" y2="32"/>
      <line x1="32" y1="32" x2="35" y2="26"/>
      <line x1="32" y1="32" x2="29" y2="26"/>
      <line x1="32" y1="32" x2="25" y2="32"/>
      <line x1="32" y1="32" x2="29" y2="38"/>
      <line x1="32" y1="32" x2="35" y2="38"/>
    </g>

    <!-- Iris hexagonal ring connections -->
    <g stroke="#00D4FF" stroke-width="0.7" opacity="0.38">
      <line x1="39" y1="32" x2="35" y2="26"/>
      <line x1="35" y1="26" x2="29" y2="26"/>
      <line x1="29" y1="26" x2="25" y2="32"/>
      <line x1="25" y1="32" x2="29" y2="38"/>
      <line x1="29" y1="38" x2="35" y2="38"/>
      <line x1="35" y1="38" x2="39" y2="32"/>
    </g>

    <!-- Subtle scan line for AI / retinal-scan feel -->
    <line x1="8" y1="32" x2="56" y2="32"
          stroke="#00D4FF" stroke-width="0.45" opacity="0.18"/>

  </g>

  <!-- ── 3. Iris ring nodes (6) ── -->
  <circle cx="39" cy="32" r="1.7" fill="#00D4FF" filter="url(#nodeGlow)"/>
  <circle cx="35" cy="26" r="1.7" fill="#00D4FF" filter="url(#nodeGlow)"/>
  <circle cx="29" cy="26" r="1.7" fill="#00D4FF" filter="url(#nodeGlow)"/>
  <circle cx="25" cy="32" r="1.7" fill="#00D4FF" filter="url(#nodeGlow)"/>
  <circle cx="29" cy="38" r="1.7" fill="#00D4FF" filter="url(#nodeGlow)"/>
  <circle cx="35" cy="38" r="1.7" fill="#00D4FF" filter="url(#nodeGlow)"/>

  <!-- ── 4. Eye tip corner nodes ── -->
  <circle cx="4"  cy="32" r="2.2" fill="#00D4FF" filter="url(#nodeGlow)"/>
  <circle cx="60" cy="32" r="2.2" fill="#00D4FF" filter="url(#nodeGlow)"/>

  <!-- ── 5. Eye outline (drawn after fill/network for crispness) ── -->
  <path d="M 4 32 C 16 16, 48 16, 60 32 C 48 48, 16 48, 4 32 Z"
        stroke="url(#eyeStroke)"
        stroke-width="2.2"
        filter="url(#eyeOuterGlow)"/>

  <!-- ── 6. Pupil gold aura ── -->
  <circle cx="32" cy="32" r="8.5" fill="#FFD700" opacity="0.14"
          filter="url(#pupilGlow)"/>

  <!-- ── 7. Pupil solid ── -->
  <circle cx="32" cy="32" r="5.2" fill="url(#pupilGold)"
          filter="url(#nodeGlow)"/>

  <!-- ── 8. Specular highlight on pupil ── -->
  <ellipse cx="30.4" cy="29.8" rx="1.7" ry="1.1"
           fill="rgba(255,255,255,0.58)"
           transform="rotate(-28 30.4 29.8)"/>

</svg>
