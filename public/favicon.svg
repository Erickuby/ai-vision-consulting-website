<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>

    <!-- Cyan gradient for diamond outline & crossbar -->
    <linearGradient id="strokeGrad" x1="5" y1="5" x2="59" y2="59" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#33DDFF"/>
      <stop offset="100%" stop-color="#0077AA"/>
    </linearGradient>

    <!-- Gold gradient for centre node -->
    <radialGradient id="goldGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#FFF3A0"/>
      <stop offset="45%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E07800"/>
    </radialGradient>

    <!-- Soft glow on cyan nodes -->
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Larger glow on gold centre -->
    <filter id="goldGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ── Subtle inner diamond fill ── -->
  <path d="M32 6 L58 32 L32 58 L6 32 Z"
        fill="rgba(0,60,100,0.28)"/>

  <!-- ── Diamond outline  (A top ∧ + V bottom ∨ merged) ── -->
  <path d="M32 6 L58 32 L32 58 L6 32 Z"
        stroke="url(#strokeGrad)"
        stroke-width="2.5"
        stroke-linejoin="round"/>

  <!-- ── Crossbar — the horizontal bar of the A ── -->
  <line x1="19" y1="32" x2="45" y2="32"
        stroke="url(#strokeGrad)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- ── Four corner neural-network nodes ── -->
  <circle cx="32" cy="6"  r="3" fill="#00D4FF" filter="url(#cyanGlow)"/>
  <circle cx="58" cy="32" r="3" fill="#00D4FF" filter="url(#cyanGlow)"/>
  <circle cx="32" cy="58" r="3" fill="#00D4FF" filter="url(#cyanGlow)"/>
  <circle cx="6"  cy="32" r="3" fill="#00D4FF" filter="url(#cyanGlow)"/>

  <!-- ── Gold aura behind centre ── -->
  <circle cx="32" cy="32" r="10" fill="#FFD700" opacity="0.18" filter="url(#goldGlow)"/>

  <!-- ── Gold centre node (the "vision" focal point) ── -->
  <circle cx="32" cy="32" r="5.5" fill="url(#goldGrad)" filter="url(#cyanGlow)"/>

  <!-- ── Specular highlight on gold node ── -->
  <ellipse cx="30.5" cy="30" rx="2" ry="1.4"
           fill="rgba(255,255,255,0.55)"
           transform="rotate(-20 30.5 30)"/>

</svg>
